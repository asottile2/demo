repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.3.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
-   repo: local
    hooks:
    -   id: loud
        name: loud
        verbose: true
        language: system
        always_run: true
        pass_filenames: false
        entry: python3 -c '[print("a" * 99) for _ in range(16000)]'
