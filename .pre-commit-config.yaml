fail_fast: true
ci:
    autofix_commit_msg: 'pre-commit.ci autofix'
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
-   repo: local
    hooks:
    -   id: wat
        name: wat
        language: system
        verbose: true
        entry: echo hi
        pass_filenames: false
        always_run: true
