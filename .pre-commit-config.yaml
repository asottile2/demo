fail_fast: true
ci:
    autofix_commit_msg: 'pre-commit.ci autofix'
    skip: [wat]
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
-   repo: local
    hooks:
    -   id: wat
        name: wat
        entry: wat
        language: python
        additional_dependencies: [asottile-this-does-not-exist]
